<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FQC Audit Tracker — Alkhorayef Petroleum</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F0;color:#1a1a18;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e8e8e4;padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:14px;font-weight:600;color:#1a1a18;padding:14px 0;margin-right:28px;display:flex;align-items:center;gap:8px}
.topbar-brand span{color:#1D9E75}
.nav-tab{font-size:13px;color:#6b6b67;padding:14px 14px;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:color .15s}
.nav-tab:hover{color:#1a1a18}
.nav-tab.active{color:#1a1a18;border-bottom-color:#1D9E75;font-weight:500}
.content{padding:20px;max-width:1200px;margin:0 auto}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:15px;font-weight:600;color:#1a1a18}
.btn{font-size:13px;padding:7px 14px;border:1px solid #d4d4ce;border-radius:8px;background:#fff;color:#1a1a18;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-primary:hover{background:#0F6E56}
.btn-sm{font-size:12px;padding:4px 10px}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:11px;color:#6b6b67;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{font-size:13px;padding:8px 10px;border:1px solid #d4d4ce;border-radius:8px;background:#fff;color:#1a1a18;width:100%}
.field select{cursor:pointer}
.field textarea{resize:vertical;min-height:72px}
.metric-card{background:#f9f9f6;border:1px solid #e8e8e4;border-radius:8px;padding:14px 16px}
.metric-label{font-size:11px;color:#6b6b67;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.metric-value{font-size:26px;font-weight:600;color:#1a1a18}
.metric-sub{font-size:12px;color:#6b6b67;margin-top:2px}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-nc{background:#FCEBEB;color:#A32D2D}
.badge-critical{background:#FAECE7;color:#993C1D}
.badge-major{background:#FAEEDA;color:#854F0B}
.badge-minor{background:#E6F1FB;color:#185FA5}
.badge-strength{background:#EAF3DE;color:#3B6D11}
.badge-open{background:#FAEEDA;color:#854F0B}
.badge-overdue{background:#FCEBEB;color:#A32D2D}
.badge-closed{background:#EAF3DE;color:#3B6D11}
.badge-hse{background:#EAF3DE;color:#3B6D11}
.badge-quality{background:#E6F1FB;color:#185FA5}
.badge-both{background:#EEEDFE;color:#534AB7}
.badge-kwt{background:#E6F1FB;color:#185FA5}
.badge-me{background:#E1F5EE;color:#0F6E56}
.badge-latam{background:#FAEEDA;color:#854F0B}
.badge-afr{background:#FAECE7;color:#993C1D}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;color:#6b6b67;text-align:left;padding:8px 12px;border-bottom:1px solid #e8e8e4;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 12px;border-bottom:1px solid #f0f0ec;color:#1a1a18;vertical-align:middle}
tr:hover td{background:#fafaf8}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{font-size:12px;padding:6px 10px;border:1px solid #d4d4ce;border-radius:8px;background:#fff;color:#1a1a18}
.filter-bar input{width:220px}
.findings-block{border:1px solid #e8e8e4;border-radius:8px;margin-bottom:8px;overflow:hidden}
.finding-header{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f9f9f6;font-size:13px;font-weight:500;justify-content:space-between}
.finding-body{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.divider{height:1px;background:#e8e8e4;margin:16px 0}
.form-section-title{font-size:11px;font-weight:600;color:#6b6b67;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 12px;padding-bottom:6px;border-bottom:1px solid #e8e8e4}
.finding-add-btn{width:100%;padding:9px;border:1px dashed #d4d4ce;border-radius:8px;background:transparent;color:#6b6b67;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.finding-add-btn:hover{background:#f5f5f0}
.settings-list{background:#f9f9f6;border:1px solid #e8e8e4;border-radius:8px;padding:14px}
.settings-list h3{font-size:11px;font-weight:600;color:#6b6b67;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{font-size:12px;padding:3px 10px;background:#fff;border:1px solid #d4d4ce;border-radius:10px;display:inline-flex;align-items:center;gap:6px;color:#1a1a18}
.tag-del{cursor:pointer;color:#999;font-size:15px;line-height:1}
.tag-del:hover{color:#E24B4A}
.add-tag-row{display:flex;gap:8px}
.add-tag-row input{font-size:12px;padding:5px 10px;border:1px solid #d4d4ce;border-radius:8px;background:#fff;color:#1a1a18;flex:1}
.overdue-row td{color:#A32D2D}
.chart-wrap{position:relative;width:100%;height:220px}
.tab-count{background:#f0f0ec;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600}
.status-select{font-size:11px;padding:3px 7px;border:1px solid #d4d4ce;border-radius:6px;background:#fff;color:#1a1a18;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand"><i class="ti ti-clipboard-check" style="font-size:18px;color:#1D9E75"></i> FQC Audit <span>Tracker</span></div>
  <div class="nav-tab active" onclick="showTab('dashboard')" id="tab-dashboard"><i class="ti ti-chart-bar"></i> Dashboard</div>
  <div class="nav-tab" onclick="showTab('tracker')" id="tab-tracker"><i class="ti ti-list"></i> Findings tracker <span class="tab-count" id="cnt-tracker">0</span></div>
  <div class="nav-tab" onclick="showTab('new-audit')" id="tab-new-audit"><i class="ti ti-plus"></i> New audit</div>
  <div class="nav-tab" onclick="showTab('settings')" id="tab-settings"><i class="ti ti-settings"></i> Settings</div>
</div>

<div id="view-dashboard" class="content"></div>
<div id="view-tracker" class="content" style="display:none"></div>
<div id="view-new-audit" class="content" style="display:none"></div>
<div id="view-settings" class="content" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const REGIONS = {
  'Kuwait':['Kuwait'],
  'Middle East':['Saudi Arabia','Oman','Iraq','UAE'],
  'LATAM':['Colombia','Mexico','Ecuador','Venezuela'],
  'Africa':['Egypt','Sudan','South Sudan','Congo','Libya']
};

const MASTER = {
  auditors:['Mohammed Al-Jaberi','Lida C. Pinilla','Nithin Thomas','Manoj Malgunkar','Mohammed Rameez','Abin Paul Parokaran Joseph','Suresh Babu Ganji','Vladimir Kolesnikov','Hameed Alwajeeh','Benny Abraham','Kolasserikuttiyil Sreekumar','Anil Babu Mude','MM','KK','NN','AA','GG'],
  countries:['Kuwait','Saudi Arabia','Oman','Iraq','UAE','Colombia','Mexico','Ecuador','Venezuela','Egypt','Sudan','South Sudan','Congo','Libya'],
  locations:['KOC ESP','KMC (Kuwait Manufacturing Center)','JO-ESP','JO-GMP','JO-FLS','JO-Humma','GENSET/HE','JO-Polymer Injection','Villavicencio','Villanueva','Bogota ESP Plant','Coca','Dammam DHE Plant','DHE-Motor','DMC','North Project','Hawtah Project','VTP','All Fields','Alexandria Plant','Iraq Ops','Paloch','Dammam Yard','ABHD Field','HQ Office'],
  clients:['KOC','Ecopetrol','Aramco','AKHU','PDO','ADNOC','Petroamazonas','Petroperu'],
  segments:['ESPO','ESP-HPS-O','ESP & HPS','Operations'],
  auditTitles:['Field Visit','Pre-Installation Audit','Surface Inspection','Weekly HSE Audit','Rig HSE Audit','Supplier Audit','Process Audit','Equipment Inspection','Troubleshooting Engineer Audit','GCH Field Surface Inspection'],
  categories:['Equipment & Tools','PPE Compliance','SOP / Contractual Breach','Electrical Safety','Housekeeping','Documentation','Training & Competency','Supervision','HSE Behavior','Mechanical Integrity','Chemical Handling'],
  owners:['Mohammed Al-Jaberi','Lida C. Pinilla','Nithin Thomas','Manoj Malgunkar','Mohammed Rameez','Abin Paul','Suresh Babu Ganji','Kolasserikuttiyil Sreekumar','Field Team Lead','Customer Representative']
};

let audits = [
  {id:'KU-ADT-26-0136',date:'2026-05-22',auditor:'Mohammed Al-Jaberi',country:'Kuwait',location:'KOC ESP',client:'KOC',segment:'ESPO',type:'Quality',title:'Field visit for wells in GC-24',posFindings:'Stop work authority used correctly to halt untested belt use on boom truck.',negFindings:'Multiple SOP breaches: PPE non-compliance, VSD doors not sealed, wrong equipment used, pressure gauge covers left in place.',status:'Open'},
  {id:'CO-ADT-26-0002',date:'2026-02-26',auditor:'Lida C. Pinilla',country:'Colombia',location:'Villavicencio',client:'Ecopetrol',segment:'ESPO',type:'HSE',title:'GCH Field Surface Inspection Audit',posFindings:'High knowledge level observed. Strong commitment to good practices including proper care of tools, adequate vehicle maintenance, and compliance with housekeeping standards.',negFindings:'Update field procedures for current ops standards. Standardize HSE documentation. Provide targeted training.',status:'Open'},
  {id:'KU-ADT-26-0122',date:'2026-05-11',auditor:'Mohammed Al-Jaberi',country:'Kuwait',location:'KOC ESP',client:'KOC',segment:'ESPO',type:'Quality',title:'Wells ERL +90% performance and data quality review',posFindings:'Data entry discipline improved significantly versus prior quarter.',negFindings:'Three wells with inconsistent monitoring intervals. Data gap in two ERL records.',status:'Open'},
  {id:'KU-ADT-25-0451',date:'2025-12-06',auditor:'Mohammed Al-Jaberi',country:'Kuwait',location:'KOC ESP',client:'KOC',segment:'ESPO',type:'Quality',title:'RA-GC-15 monitoring crew field visit observation',posFindings:'Crew demonstrated solid understanding of ESP operation basics.',negFindings:'Monitoring frequency below agreed schedule. No field notebook maintained.',status:'Open'},
  {id:'EC-ADT-26-0014',date:'2026-05-10',auditor:'Lida C. Pinilla',country:'Ecuador',location:'Coca',client:'Petroamazonas',segment:'ESP & HPS',type:'HSE',title:'PKNB-022 Pulling operation',posFindings:'JSA completed and signed by all crew members before operation commenced.',negFindings:'Two crew members without proper PPE during pulling phase.',status:'Open'},
];

let findings = [
  {id:'F001',auditId:'KU-ADT-26-0136',seq:1,description:'VSD door was not closed and securely sealed during operation. Water ingress caused 17h 14min downtime. Display System control board damaged.',classification:'Critical',category:'Equipment & Tools',owner:'Nithin Thomas',dueDate:'2026-05-09',status:'Overdue',closureDate:''},
  {id:'F002',auditId:'KU-ADT-26-0136',seq:2,description:'DC bus capacitor blown due to repeated restart attempts by crew. VSD tripped due to low KVA. Crew continued restarting without diagnosing root cause, risking motor/cable/EFT damage.',classification:'Critical',category:'Electrical Safety',owner:'Nithin Thomas',dueDate:'2026-05-30',status:'Open',closureDate:''},
  {id:'F003',auditId:'KU-ADT-26-0136',seq:3,description:'Six-pulse VSD installed against contract specification. Higher harmonic distortion and poor enclosure condition — not suitable for operation per contract. Should have been rejected before commissioning.',classification:'NC',category:'SOP / Contractual Breach',owner:'Nithin Thomas',dueDate:'2026-05-31',status:'Open',closureDate:''},
  {id:'F004',auditId:'KU-ADT-26-0136',seq:4,description:'Crew without full PPE during surface equipment conversion. Untested belts on boom truck. Ladder available but unused — improper preparation led to VSD damage.',classification:'Major',category:'PPE Compliance',owner:'Nithin Thomas',dueDate:'2026-05-30',status:'Open',closureDate:''},
  {id:'F005',auditId:'KU-ADT-26-0136',seq:5,description:'Extra sensor chock kept on location. No VSD or transformer plate or lugs used.',classification:'Minor',category:'Housekeeping',owner:'Nithin Thomas',dueDate:'2026-04-04',status:'Overdue',closureDate:''},
  {id:'F006',auditId:'KU-ADT-26-0136',seq:6,description:'Underload alarm bypassed on SA-0503. Direct SOP violation.',classification:'NC',category:'SOP / Contractual Breach',owner:'Nithin Thomas',dueDate:'2026-05-30',status:'Open',closureDate:''},
  {id:'F007',auditId:'KU-ADT-26-0136',seq:7,description:'Confirm if crew can access the restricted area and whether the well case was reported to KOC as required.',classification:'Major',category:'Documentation',owner:'Kolasserikuttiyil Sreekumar',dueDate:'2026-05-30',status:'Open',closureDate:''},
  {id:'F008',auditId:'KU-ADT-26-0136',seq:8,description:'VSD display window not closed on SA-0503.',classification:'Minor',category:'Equipment & Tools',owner:'Nithin Thomas',dueDate:'2026-05-30',status:'Open',closureDate:''},
  {id:'F009',auditId:'KU-ADT-26-0136',seq:9,description:'VSD filter removed and kept on location instead of being reinstalled after maintenance.',classification:'Minor',category:'Housekeeping',owner:'Nithin Thomas',dueDate:'2026-05-30',status:'Open',closureDate:''},
  {id:'F010',auditId:'KU-ADT-26-0136',seq:10,description:'Stop work authority correctly exercised — crew halted job when untested belts identified on boom truck. Commendable proactive safety behavior.',classification:'Strength',category:'HSE Behavior',owner:'',dueDate:'',status:'Closed',closureDate:'2026-05-22'},
  {id:'F011',auditId:'CO-ADT-26-0002',seq:1,description:'Field procedures not aligned with current operational practices and applicable client requirements.',classification:'Major',category:'Documentation',owner:'Lida C. Pinilla',dueDate:'2026-04-30',status:'Open',closureDate:''},
  {id:'F012',auditId:'CO-ADT-26-0002',seq:2,description:'General HSE documentation not current, controlled, or compliant with corporate requirements.',classification:'Major',category:'SOP / Contractual Breach',owner:'Lida C. Pinilla',dueDate:'2026-04-30',status:'Open',closureDate:''},
  {id:'F013',auditId:'EC-ADT-26-0014',seq:1,description:'Two crew members observed without correct PPE during pulling phase — no hard hats and one missing safety glasses.',classification:'Major',category:'PPE Compliance',owner:'Lida C. Pinilla',dueDate:'2026-05-20',status:'Open',closureDate:''},
];

let activeTab='dashboard';
let charts={};
let draftFindings=[];

function getRegion(country){
  for(const [r,cs] of Object.entries(REGIONS)){if(cs.includes(country))return r;}
  return 'Unknown';
}

function regionBadge(country){
  const r=getRegion(country);
  const cls={'Kuwait':'kwt','Middle East':'me','LATAM':'latam','Africa':'afr'}[r]||'me';
  return `<span class="badge badge-${cls}">${r}</span>`;
}

function clsBadge(c){
  const m={NC:'nc',Critical:'critical',Major:'major',Minor:'minor',Strength:'strength'};
  return `<span class="badge badge-${m[c]||'minor'}">${c}</span>`;
}

function stsBadge(s){
  const m={Open:'open',Overdue:'overdue',Closed:'closed'};
  return `<span class="badge badge-${m[s]||'open'}">${s}</span>`;
}

function typeBadge(t){
  if(t==='HSE')return `<span class="badge badge-hse">HSE</span>`;
  if(t==='Quality')return `<span class="badge badge-quality">Quality</span>`;
  return `<span class="badge badge-both">HSE & Quality</span>`;
}

function selOpts(arr,sel=''){
  return arr.map(a=>`<option value="${a}"${a===sel?' selected':''}>${a}</option>`).join('');
}

function showTab(tab){
  activeTab=tab;
  ['dashboard','tracker','new-audit','settings'].forEach(t=>{
    document.getElementById('view-'+t).style.display=t===tab?'':'none';
    const el=document.getElementById('tab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  if(tab==='dashboard')renderDashboard();
  else if(tab==='tracker')renderTracker();
  else if(tab==='new-audit')renderNewAudit();
  else if(tab==='settings')renderSettings();
}

function renderDashboard(){
  const el=document.getElementById('view-dashboard');
  const total=findings.length;
  const open=findings.filter(f=>f.status==='Open').length;
  const overdue=findings.filter(f=>f.status==='Overdue').length;
  const closed=findings.filter(f=>f.status==='Closed').length;
  const nc=findings.filter(f=>f.classification==='NC').length;
  const critical=findings.filter(f=>f.classification==='Critical').length;
  const strengths=findings.filter(f=>f.classification==='Strength').length;
  const closureRate=total>0?Math.round((closed/total)*100):0;
  const overdueAudits=audits.filter(a=>findings.some(f=>f.auditId===a.id&&f.status==='Overdue')).length;

  const byRegion={};
  audits.forEach(a=>{const r=getRegion(a.country);byRegion[r]=(byRegion[r]||0)+1;});

  const byClass={NC:0,Critical:0,Major:0,Minor:0,Strength:0};
  findings.forEach(f=>{byClass[f.classification]=(byClass[f.classification]||0)+1;});

  const byMonth={};
  findings.filter(f=>f.classification!=='Strength').forEach(f=>{
    const a=audits.find(x=>x.id===f.auditId);
    if(a&&a.date){const d=new Date(a.date);const m=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;byMonth[m]=(byMonth[m]||0)+1;}
  });
  const months=Object.keys(byMonth).sort().slice(-6);

  el.innerHTML=`
  <div class="section-head">
    <div class="section-title">KPI Dashboard</div>
    <div style="font-size:12px;color:#6b6b67">Year to date · 2026 · Alkhorayef Petroleum — FQC Program</div>
  </div>
  <div class="grid-4" style="margin-bottom:16px">
    <div class="metric-card"><div class="metric-label">Total findings</div><div class="metric-value">${total}</div><div class="metric-sub">${audits.length} audits logged</div></div>
    <div class="metric-card"><div class="metric-label">Open</div><div class="metric-value" style="color:#854F0B">${open}</div><div class="metric-sub">${overdue} overdue · ${overdueAudits} audit(s) affected</div></div>
    <div class="metric-card"><div class="metric-label">Closure rate</div><div class="metric-value" style="color:#3B6D11">${closureRate}%</div><div class="metric-sub">${closed} corrective actions closed</div></div>
    <div class="metric-card"><div class="metric-label">NC + Critical</div><div class="metric-value" style="color:#A32D2D">${nc+critical}</div><div class="metric-sub">${strengths} strength${strengths!==1?'s':''} observed</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:14px">
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Findings by classification</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;font-size:11px;color:#6b6b67">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#E24B4A;display:inline-block"></span>NC (${byClass.NC})</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#D85A30;display:inline-block"></span>Critical (${byClass.Critical})</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#EF9F27;display:inline-block"></span>Major (${byClass.Major})</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD;display:inline-block"></span>Minor (${byClass.Minor})</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#639922;display:inline-block"></span>Strength (${byClass.Strength})</span>
      </div>
      <div class="chart-wrap"><canvas id="chartClass" role="img" aria-label="Bar chart showing findings by classification"></canvas></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Monthly findings trend</div>
      <div style="display:flex;gap:12px;margin-bottom:12px;font-size:11px;color:#6b6b67">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:2px;background:#1D9E75;display:inline-block"></span>Finding count (excl. strengths)</span>
      </div>
      <div class="chart-wrap"><canvas id="chartTrend" role="img" aria-label="Line chart showing monthly findings trend"></canvas></div>
    </div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Audit distribution by region</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;font-size:11px;color:#6b6b67">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#378ADD;display:inline-block"></span>Kuwait</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#1D9E75;display:inline-block"></span>Middle East</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#EF9F27;display:inline-block"></span>LATAM</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#D85A30;display:inline-block"></span>Africa</span>
      </div>
      <div class="chart-wrap"><canvas id="chartRegion" role="img" aria-label="Doughnut chart showing audit distribution by region"></canvas></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 16px 10px;font-size:13px;font-weight:600;border-bottom:1px solid #e8e8e4">Overdue corrective actions</div>
      <table>
        <thead><tr><th>Report ID</th><th>Finding description</th><th>Owner</th><th>Due date</th></tr></thead>
        <tbody>${findings.filter(f=>f.status==='Overdue').map(f=>`
        <tr class="overdue-row">
          <td style="font-size:12px;font-weight:500">${f.auditId}</td>
          <td style="max-width:200px;font-size:12px">${f.description.substring(0,65)}…</td>
          <td style="font-size:12px">${f.owner||'—'}</td>
          <td style="font-size:12px;font-weight:500">${f.dueDate||'—'}</td>
        </tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:#6b6b67;padding:24px">No overdue items</td></tr>'}
        </tbody>
      </table>
    </div>
  </div>`;

  setTimeout(()=>{
    Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
    charts={};

    charts.chartClass=new Chart(document.getElementById('chartClass'),{
      type:'bar',
      data:{labels:['NC','Critical','Major','Minor','Strength'],datasets:[{label:'Findings',data:[byClass.NC,byClass.Critical,byClass.Major,byClass.Minor,byClass.Strength],backgroundColor:['#E24B4A','#D85A30','#EF9F27','#378ADD','#639922'],borderRadius:5,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(0,0,0,0.04)'}},x:{grid:{display:false}}}}
    });

    charts.chartTrend=new Chart(document.getElementById('chartTrend'),{
      type:'line',
      data:{labels:months.map(m=>{const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleString('default',{month:'short'});}),datasets:[{label:'Findings',data:months.map(m=>byMonth[m]||0),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',tension:0.35,fill:true,pointBackgroundColor:'#1D9E75',pointRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(0,0,0,0.04)'}},x:{grid:{display:false},ticks:{autoSkip:false}}}}
    });

    const rLabels=Object.keys(byRegion);
    const rColors={'Kuwait':'#378ADD','Middle East':'#1D9E75','LATAM':'#EF9F27','Africa':'#D85A30'};
    charts.chartRegion=new Chart(document.getElementById('chartRegion'),{
      type:'doughnut',
      data:{labels:rLabels,datasets:[{data:rLabels.map(r=>byRegion[r]),backgroundColor:rLabels.map(r=>rColors[r]||'#888780'),borderWidth:3,borderColor:'#ffffff'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'62%'}
    });
  },150);
}

function renderTracker(){
  const el=document.getElementById('view-tracker');
  document.getElementById('cnt-tracker').textContent=findings.filter(f=>f.classification!=='Strength').length;
  el.innerHTML=`
  <div class="section-head">
    <div class="section-title">Corrective actions tracker</div>
    <button class="btn btn-primary btn-sm" onclick="showTab('new-audit')"><i class="ti ti-plus"></i> New audit</button>
  </div>
  <div class="filter-bar">
    <input type="text" placeholder="Search report ID or description…" oninput="filterTracker()" id="tracker-search">
    <select onchange="filterTracker()" id="fil-region"><option value="">All regions</option>${Object.keys(REGIONS).map(r=>`<option>${r}</option>`).join('')}</select>
    <select onchange="filterTracker()" id="fil-class"><option value="">All classifications</option><option>NC</option><option>Critical</option><option>Major</option><option>Minor</option><option>Strength</option></select>
    <select onchange="filterTracker()" id="fil-status"><option value="">All statuses</option><option>Open</option><option>Overdue</option><option>Closed</option></select>
    <select onchange="filterTracker()" id="fil-type"><option value="">All types</option><option>HSE</option><option>Quality</option><option>HSE & Quality</option></select>
    <select onchange="filterTracker()" id="fil-country"><option value="">All countries</option>${MASTER.countries.map(c=>`<option>${c}</option>`).join('')}</select>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
  <table>
    <thead><tr>
      <th>Report ID</th><th>Date</th><th>Region</th><th>Type</th><th>Classification</th><th>Category</th><th>Description</th><th>Owner</th><th>Due date</th><th>Status</th><th>Update</th>
    </tr></thead>
    <tbody id="tracker-body"></tbody>
  </table>
  </div>`;
  filterTracker();
}

function filterTracker(){
  const search=(document.getElementById('tracker-search')||{}).value||'';
  const region=(document.getElementById('fil-region')||{}).value||'';
  const cls=(document.getElementById('fil-class')||{}).value||'';
  const status=(document.getElementById('fil-status')||{}).value||'';
  const type=(document.getElementById('fil-type')||{}).value||'';
  const country=(document.getElementById('fil-country')||{}).value||'';

  let rows=findings.map(f=>{
    const a=audits.find(x=>x.id===f.auditId)||{};
    return {...f,auditDate:a.date||'',country:a.country||'',auditType:a.type||'',region:getRegion(a.country||'')};
  });

  if(search)rows=rows.filter(r=>r.auditId.toLowerCase().includes(search.toLowerCase())||r.description.toLowerCase().includes(search.toLowerCase()));
  if(region)rows=rows.filter(r=>r.region===region);
  if(cls)rows=rows.filter(r=>r.classification===cls);
  if(status)rows=rows.filter(r=>r.status===status);
  if(type)rows=rows.filter(r=>r.auditType===type);
  if(country)rows=rows.filter(r=>r.country===country);

  const body=document.getElementById('tracker-body');
  if(!body)return;
  if(!rows.length){body.innerHTML=`<tr><td colspan="11" style="text-align:center;padding:32px;color:#6b6b67">No findings match the current filters</td></tr>`;return;}
  body.innerHTML=rows.map(f=>`
  <tr>
    <td style="font-size:12px;font-weight:600">${f.auditId}</td>
    <td style="font-size:12px">${f.auditDate||'—'}</td>
    <td>${regionBadge(f.country)}</td>
    <td>${typeBadge(f.auditType)}</td>
    <td>${clsBadge(f.classification)}</td>
    <td style="font-size:12px;max-width:110px">${f.category}</td>
    <td style="font-size:12px;max-width:200px">${f.description.substring(0,70)}${f.description.length>70?'…':''}</td>
    <td style="font-size:12px">${f.owner||'—'}</td>
    <td style="font-size:12px;color:${f.status==='Overdue'?'#A32D2D':'#1a1a18'};font-weight:${f.status==='Overdue'?'600':'400'}">${f.dueDate||'—'}</td>
    <td>${stsBadge(f.status)}</td>
    <td><select class="status-select" onchange="updateStatus('${f.id}',this.value)">
      <option ${f.status==='Open'?'selected':''}>Open</option>
      <option ${f.status==='Overdue'?'selected':''}>Overdue</option>
      <option ${f.status==='Closed'?'selected':''}>Closed</option>
    </select></td>
  </tr>`).join('');
}

function updateStatus(fid,val){
  const f=findings.find(x=>x.id===fid);
  if(f){f.status=val;if(val==='Closed')f.closureDate=new Date().toISOString().split('T')[0];}
}

function renderNewAudit(){
  const el=document.getElementById('view-new-audit');
  draftFindings=[];
  el.innerHTML=`
  <div class="section-head"><div class="section-title">New audit entry</div></div>
  <div class="card">
    <div class="form-section-title">Audit header</div>
    <div class="grid-3">
      <div class="field"><label>Report ID</label><input id="f-id" placeholder="e.g. KU-ADT-26-0200"></div>
      <div class="field"><label>Audit date</label><input type="date" id="f-date"></div>
      <div class="field"><label>Auditor / FQC</label><select id="f-auditor"><option value="">Select auditor…</option>${selOpts(MASTER.auditors)}</select></div>
    </div>
    <div class="grid-3">
      <div class="field"><label>Country</label><select id="f-country"><option value="">Select country…</option>${MASTER.countries.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Location / field</label><select id="f-location"><option value="">Select location…</option>${selOpts(MASTER.locations)}</select></div>
      <div class="field"><label>Client</label><select id="f-client"><option value="">Select client…</option>${selOpts(MASTER.clients)}</select></div>
    </div>
    <div class="grid-3">
      <div class="field"><label>Segment</label><select id="f-segment"><option value="">Select segment…</option>${selOpts(MASTER.segments)}</select></div>
      <div class="field"><label>Audit type</label><select id="f-type"><option value="">Select type…</option><option>HSE</option><option>Quality</option><option>HSE & Quality</option></select></div>
      <div class="field"><label>Audit title</label><select id="f-title"><option value="">Select title…</option>${selOpts(MASTER.auditTitles)}</select></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Positive findings / strengths observed</label><textarea id="f-pos" placeholder="Describe observed best practices or commendable behaviors…"></textarea></div>
      <div class="field"><label>General findings summary</label><textarea id="f-neg" placeholder="Summarize overall areas requiring improvement…"></textarea></div>
    </div>
    <div class="divider"></div>
    <div class="form-section-title">Corrective actions / findings</div>
    <div id="draft-findings-list"></div>
    <button class="finding-add-btn" onclick="addDraftFinding()"><i class="ti ti-plus"></i> Add finding / corrective action</button>
    <div class="divider"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="showTab('tracker')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAudit()"><i class="ti ti-check"></i> Save audit</button>
    </div>
  </div>`;
}

function addDraftFinding(){
  const idx=draftFindings.length;
  draftFindings.push({seq:idx+1,description:'',classification:'Major',category:'',owner:'',dueDate:'',status:'Open'});
  renderDraftFindings();
}

function renderDraftFindings(){
  const el=document.getElementById('draft-findings-list');
  if(!el)return;
  el.innerHTML=draftFindings.map((f,i)=>`
  <div class="findings-block">
    <div class="finding-header">
      <span><span style="font-size:11px;color:#6b6b67;margin-right:6px">#${f.seq}</span>${clsBadge(f.classification)}<span style="margin-left:8px;font-weight:400;color:#6b6b67;font-size:12px">${f.description?f.description.substring(0,50)+'…':'New finding'}</span></span>
      <span onclick="removeDraftFinding(${i})" style="cursor:pointer;color:#999;font-size:20px;line-height:1" title="Remove">×</span>
    </div>
    <div class="finding-body">
      <div class="field" style="margin:0"><label>Classification</label>
        <select onchange="draftFindings[${i}].classification=this.value;renderDraftFindings()">
          ${['NC','Critical','Major','Minor','Strength'].map(c=>`<option value="${c}"${c===f.classification?' selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="margin:0"><label>Root cause category</label>
        <select onchange="draftFindings[${i}].category=this.value"><option value="">Select…</option>${selOpts(MASTER.categories,f.category)}</select>
      </div>
      <div class="field" style="margin:0;grid-column:1/-1"><label>Finding description & corrective action required</label>
        <textarea rows="2" onchange="draftFindings[${i}].description=this.value" placeholder="Describe the finding and the corrective action required…">${f.description}</textarea>
      </div>
      <div class="field" style="margin:0"><label>Responsible owner</label>
        <select onchange="draftFindings[${i}].owner=this.value"><option value="">Select…</option>${selOpts(MASTER.owners,f.owner)}</select>
      </div>
      <div class="field" style="margin:0"><label>Due date</label>
        <input type="date" value="${f.dueDate}" onchange="draftFindings[${i}].dueDate=this.value">
      </div>
    </div>
  </div>`).join('');
}

function removeDraftFinding(i){
  draftFindings.splice(i,1);
  draftFindings.forEach((f,j)=>f.seq=j+1);
  renderDraftFindings();
}

function submitAudit(){
  const id=document.getElementById('f-id').value.trim();
  if(!id){alert('Report ID is required.');return;}
  if(audits.find(a=>a.id===id)){alert('A report with this ID already exists.');return;}
  const audit={id,date:document.getElementById('f-date').value,auditor:document.getElementById('f-auditor').value,country:document.getElementById('f-country').value,location:document.getElementById('f-location').value,client:document.getElementById('f-client').value,segment:document.getElementById('f-segment').value,type:document.getElementById('f-type').value,title:document.getElementById('f-title').value,posFindings:document.getElementById('f-pos').value,negFindings:document.getElementById('f-neg').value,status:'Open'};
  audits.push(audit);
  draftFindings.forEach((f,i)=>{
    findings.push({id:`F${Date.now()}${i}`,auditId:id,seq:f.seq,description:f.description,classification:f.classification,category:f.category,owner:f.owner,dueDate:f.dueDate,status:f.status,closureDate:''});
  });
  showTab('tracker');
}

function renderSettings(){
  const el=document.getElementById('view-settings');
  el.innerHTML=`
  <div class="section-head"><div class="section-title">Settings — master lists</div><div style="font-size:12px;color:#6b6b67">Add or remove values used in all dropdowns across the system</div></div>
  <div class="grid-2">
    ${renderMasterList('Auditor names','auditors')}
    ${renderMasterList('Countries','countries')}
    ${renderMasterList('Locations / fields','locations')}
    ${renderMasterList('Clients','clients')}
    ${renderMasterList('Root cause categories','categories')}
    ${renderMasterList('Audit titles','auditTitles')}
    ${renderMasterList('Responsible owners','owners')}
    ${renderMasterList('Segments','segments')}
  </div>`;
}

function renderMasterList(label,key){
  return `<div class="settings-list">
    <h3>${label}</h3>
    <div class="tag-list">${MASTER[key].map((v,i)=>`<span class="tag">${v}<span class="tag-del" onclick="removeTag('${key}',${i})">×</span></span>`).join('')}</div>
    <div class="add-tag-row">
      <input id="inp-${key}" placeholder="Add new value…" onkeydown="if(event.key==='Enter')addTag('${key}')">
      <button class="btn btn-sm" onclick="addTag('${key}')"><i class="ti ti-plus"></i> Add</button>
    </div>
  </div>`;
}

function addTag(key){
  const inp=document.getElementById('inp-'+key);
  const val=inp.value.trim();
  if(!val||MASTER[key].includes(val))return;
  MASTER[key].push(val);
  inp.value='';
  renderSettings();
}

function removeTag(key,i){
  MASTER[key].splice(i,1);
  renderSettings();
}

showTab('dashboard');
</script>
</body>
</html>
